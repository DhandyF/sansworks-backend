services:
  - type: web
    name: sansworks-api
    dockerfilePath: Dockerfile
    dockerContext: .
    env:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: YOUR_NEON_HOST
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: sansworks
      - key: DB_USERNAME
        value: YOUR_USERNAME
      - key: DB_PASSWORD
        value: YOUR_PASSWORD
      - key: APP_KEY
        generateValue: true