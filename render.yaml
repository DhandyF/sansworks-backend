services:
  - type: web
    name: sansworks-api
    dockerfilePath: Dockerfile
    dockerContext: .
    env:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: ep-gentle-cell-a4kk44jz-pooler.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_PASSWORD
        value: npg_lIXkpasss
      - key: APP_KEY
        generateValue: true
